<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tip Alerts Overlay</title>
<style>
  /* Transparent page: add as an OBS Browser Source */
  body { margin: 0; background: transparent; overflow: hidden;
         font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  #alert {
    position: absolute; top: 40px; left: 50%; transform: translateX(-50%) translateY(-30px);
    opacity: 0; transition: opacity .4s ease, transform .4s ease;
    min-width: 340px; max-width: 560px;
    background: linear-gradient(135deg, rgba(58,15,40,.96), rgba(26,14,21,.96));
    border: 2px solid var(--tier, #ff5fa2); border-radius: 18px; padding: 20px 28px;
    box-shadow: 0 0 40px var(--glow, rgba(255,95,162,.5)); text-align: center; color: #fff;
  }
  #alert.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  /* piggies that bounce on either side of the alert */
  #alert .pig { position: absolute; top: 50%; font-size: 2rem; animation: pigHop .6s ease-in-out infinite; }
  #alert .pig.l { left: -14px; } #alert .pig.r { right: -14px; animation-delay: .2s; }
  @keyframes pigHop { 0%,100% { transform: translateY(-60%) rotate(-6deg); } 50% { transform: translateY(-40%) rotate(6deg); } }
  #gif { max-width: 220px; max-height: 160px; margin-bottom: 10px; border-radius: 10px; display: none; }
  #gif.on { display: inline-block; }
  .head { font-size: 1.6rem; font-weight: 800; }
  .head .name { color: var(--tier, #ff5fa2); }
  .head .amt { color: #4be3a0; }
  .eur { color: #e0a8c6; font-size: 1rem; margin-top: 2px; }
  .msg { margin-top: 10px; font-size: 1.15rem; line-height: 1.4; word-wrap: break-word; }
</style>
</head>
<body>
<div id="alert">
  <span class="pig l">🐷</span>
  <span class="pig r">🐷</span>
  <img id="gif" alt="">
  <div class="head"><span class="name" id="name"></span> tipped <span class="amt" id="amt"></span></div>
  <div class="eur" id="eur"></div>
  <div class="msg" id="msg"></div>
</div>

<script>
(() => {
  const params = new URLSearchParams(location.search);
  const key = params.get('key') || '';
  const showMs = Number(params.get('duration') || 8) * 1000;
  const muted = params.has('mute');

  const el = {
    box: document.getElementById('alert'),
    name: document.getElementById('name'),
    amt: document.getElementById('amt'),
    eur: document.getElementById('eur'),
    msg: document.getElementById('msg'),
    gif: document.getElementById('gif'),
  };

  let settings = { sound: 'chime', tiers: [] };
  let defaultColor = '#ff5fa2';
  async function loadSettings() {
    try {
      const s = await fetch(`/api/overlay-settings?key=${encodeURIComponent(key)}`).then(r => r.json());
      if (s && !s.error) settings = s;
    } catch {}
    try {
      const t = await fetch('/api/theme').then(r => r.json());
      if (t && !t.error) {
        if (t.accent) defaultColor = t.accent;
        if (t.pig) document.querySelectorAll('#alert .pig').forEach(p => p.textContent = t.pig);
      }
    } catch {}
  }
  loadSettings();
  setInterval(loadSettings, 60_000);

  // Play an uploaded MP3 (URL/path) or a synthesized preset.
  // Returns the Audio element for uploaded clips (so the alert can match its
  // length), or null for the short synth sounds.
  function playSound(kind) {
    if (muted || !kind || kind === 'none') return null;
    if (kind.startsWith('/uploads/') || kind.startsWith('http')) {
      try { const a = new Audio(kind); a.volume = 0.9; a.play(); return a; } catch { return null; }
    }
    try {
      const ctx = new AudioContext();
      const beep = (freq, start, dur, gain = 0.25) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(0.001, ctx.currentTime + start);
        g.gain.exponentialRampToValueAtTime(gain, ctx.currentTime + start + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
        o.connect(g).connect(ctx.destination);
        o.start(ctx.currentTime + start); o.stop(ctx.currentTime + start + dur + 0.05);
      };
      if (kind === 'coin') { beep(988, 0, 0.12); beep(1319, 0.08, 0.5); }
      else if (kind === 'fanfare') { [523,659,784,1047].forEach((f,i) => beep(f, i*0.12, 0.8)); }
      else { [523.25,659.25,783.99].forEach((f,i) => beep(f, i*0.09, 0.9)); } // chime
    } catch {}
    return null;
  }

  function tierFor(eur) {
    if (eur == null) return null;
    let best = null;
    for (const t of settings.tiers || []) {
      if (eur >= t.minEur && (!best || t.minEur >= best.minEur)) best = t;
    }
    return best;
  }

  const queue = [];
  let showing = false;

  function next() {
    if (showing || !queue.length) return;
    showing = true;
    const a = queue.shift();
    const tier = a.testTier || tierFor(a.eur);

    el.box.style.setProperty('--tier', tier?.color || defaultColor);
    el.box.style.setProperty('--glow', (tier?.color || defaultColor) + '80');
    if (tier?.gif) { el.gif.src = tier.gif; el.gif.classList.add('on'); }
    else { el.gif.classList.remove('on'); el.gif.removeAttribute('src'); }

    // textContent only — donor input must never be rendered as HTML
    el.name.textContent = a.name;
    el.amt.textContent = `${a.amount} ${a.symbol}`;
    el.eur.textContent = a.eur != null ? `≈ €${a.eur}` : '';
    el.msg.textContent = a.message;
    el.box.classList.add('show');
    // custom MP3 wins, then tier preset, then the global default
    const audio = playSound(tier?.soundUrl || tier?.sound || settings.sound || 'chime');

    // Keep the alert up until its sound finishes (min = configured duration,
    // capped so a very long clip can't hog the screen), then cut the audio.
    const start = Date.now();
    let done = false;
    const finish = () => {
      if (done) return; done = true;
      el.box.classList.remove('show');
      if (audio) { try { audio.pause(); } catch {} }
      setTimeout(() => { showing = false; next(); }, 600);
    };
    const capMs = Math.max(showMs, 20_000);
    if (audio) {
      audio.addEventListener('ended', () => setTimeout(finish, Math.max(0, showMs - (Date.now() - start))));
      setTimeout(finish, capMs);
    } else {
      setTimeout(finish, showMs);
    }
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws?key=${encodeURIComponent(key)}`);
    ws.onmessage = (e) => {
      try {
        const a = JSON.parse(e.data);
        if (a.type === 'donation') { queue.push(a); next(); }
      } catch {}
    };
    ws.onclose = () => setTimeout(connect, 3000);
  }
  connect();
})();
</script>
</body>
</html>
