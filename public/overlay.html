<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tip Alerts Overlay</title>
<style>
  /* Transparent page: add as an OBS Browser Source */
  body { margin: 0; background: transparent; overflow: hidden;
         font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  #alert {
    position: absolute; top: 40px; left: 50%; transform: translateX(-50%) translateY(-30px);
    opacity: 0; transition: opacity .4s ease, transform .4s ease;
    min-width: 340px; max-width: 560px;
    background: linear-gradient(135deg, rgba(26,16,46,.95), rgba(18,18,26,.95));
    border: 2px solid #a970ff; border-radius: 18px; padding: 20px 28px;
    box-shadow: 0 0 40px rgba(169,112,255,.5); text-align: center; color: #fff;
  }
  #alert.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .head { font-size: 1.6rem; font-weight: 800; }
  .head .name { color: #a970ff; }
  .head .amt { color: #3ddc84; }
  .eur { color: #9a9aad; font-size: 1rem; margin-top: 2px; }
  .msg { margin-top: 10px; font-size: 1.15rem; line-height: 1.4; word-wrap: break-word; }
</style>
</head>
<body>
<div id="alert">
  <div class="head"><span class="name" id="name"></span> tipped <span class="amt" id="amt"></span></div>
  <div class="eur" id="eur"></div>
  <div class="msg" id="msg"></div>
</div>

<script>
(() => {
  const params = new URLSearchParams(location.search);
  const key = params.get('key') || '';
  const showMs = Number(params.get('duration') || 8) * 1000;
  const muted = params.has('mute');

  const el = {
    box: document.getElementById('alert'),
    name: document.getElementById('name'),
    amt: document.getElementById('amt'),
    eur: document.getElementById('eur'),
    msg: document.getElementById('msg'),
  };

  const queue = [];
  let showing = false;

  function chime() {
    if (muted) return;
    try {
      const ctx = new AudioContext();
      const notes = [523.25, 659.25, 783.99]; // C5 E5 G5
      notes.forEach((f, i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0.001, ctx.currentTime + i * 0.09);
        g.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime + i * 0.09 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.09 + 0.9);
        o.connect(g).connect(ctx.destination);
        o.start(ctx.currentTime + i * 0.09);
        o.stop(ctx.currentTime + i * 0.09 + 1);
      });
    } catch {}
  }

  function next() {
    if (showing || !queue.length) return;
    showing = true;
    const a = queue.shift();
    // textContent only â€” donor input must never be rendered as HTML
    el.name.textContent = a.name;
    el.amt.textContent = `${a.amount} ${a.symbol}`;
    el.eur.textContent = a.eur ? `â‰ˆ â‚¬${a.eur}` : '';
    el.msg.textContent = a.message;
    el.box.classList.add('show');
    chime();
    setTimeout(() => {
      el.box.classList.remove('show');
      setTimeout(() => { showing = false; next(); }, 600);
    }, showMs);
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws?key=${encodeURIComponent(key)}`);
    ws.onmessage = (e) => {
      try {
        const a = JSON.parse(e.data);
        if (a.type === 'donation') { queue.push(a); next(); }
      } catch {}
    };
    ws.onclose = () => setTimeout(connect, 3000);
  }
  connect();
})();
</script>
</body>
</html>
