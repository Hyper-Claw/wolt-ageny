<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tip Jar 🐷</title>
<style>
  :root {
    --bg: #1a0e15; --card: #26121d; --ink: #ffeef6; --muted: #e0a8c6;
    --accent: #ff5fa2; --accent2: #ff9ad0; --ok: #4be3a0; --err: #ff7a8a;
    --line: #4a2537;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: radial-gradient(1100px 620px at 50% -8%, #4a1533, var(--bg));
    color: var(--ink); min-height: 100vh; display: grid; place-items: start center;
    padding: 40px 16px; overflow-x: hidden;
  }

  /* --- floating background piggies --- */
  .piggies { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .piggies span {
    position: absolute; bottom: -60px; font-size: 2rem; opacity: 0;
    animation: floatUp linear infinite;
    filter: drop-shadow(0 4px 10px rgba(255,95,162,.35));
  }
  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
    10%  { opacity: .8; }
    50%  { transform: translateY(-52vh) rotate(12deg) scale(1.08); }
    90%  { opacity: .8; }
    100% { transform: translateY(-108vh) rotate(-10deg) scale(1); opacity: 0; }
  }

  .card {
    position: relative; z-index: 1;
    width: 100%; max-width: 460px; background: var(--card);
    border: 1px solid var(--line); border-radius: 20px; padding: 28px;
    box-shadow: 0 20px 60px rgba(120,10,60,.45), 0 0 0 1px rgba(255,95,162,.08) inset;
  }
  h1 { margin: 0 0 4px; font-size: 1.55rem; }
  .title-pig { display: inline-block; animation: wiggle 2.2s ease-in-out infinite; transform-origin: 60% 80%; }
  .sub { color: var(--muted); margin: 0 0 22px; font-size: .95rem; }
  label { display: block; font-size: .85rem; color: var(--muted); margin: 14px 0 6px; }
  input, textarea {
    width: 100%; background: #1c0d16; color: var(--ink);
    border: 1px solid var(--line); border-radius: 10px; padding: 11px 12px;
    font-size: 1rem; font-family: inherit;
  }
  input::placeholder, textarea::placeholder { color: #9a6480; }
  input:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,95,162,.15); }
  textarea { resize: vertical; min-height: 64px; }
  .assets { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .asset {
    padding: 12px; border-radius: 10px; border: 1px solid var(--line);
    background: #1c0d16; color: var(--ink); font-size: .95rem; cursor: pointer;
    transition: border-color .15s, background .15s, transform .1s; text-align: center;
  }
  .asset:hover { transform: translateY(-1px); }
  .asset.active { border-color: var(--accent); background: #3a1528; box-shadow: 0 0 14px rgba(255,95,162,.25); }
  .preset-head { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: .8rem; color: var(--muted); }
  .preset-head select { width: auto; padding: 5px 8px; font-size: .85rem; background: #1c0d16; color: var(--ink); border: 1px solid var(--line); border-radius: 8px; }
  .amounts { display: flex; gap: 8px; margin-top: 6px; }
  .amounts button {
    flex: 1; padding: 8px 0; border-radius: 8px; border: 1px solid var(--line);
    background: #1c0d16; color: var(--muted); cursor: pointer; font-size: .9rem; transition: .15s;
  }
  .amounts button:hover { border-color: var(--accent); color: var(--ink); }
  .amtrow { display: flex; gap: 8px; }
  .amtrow input { flex: 1; }
  .amtrow select { width: auto; padding: 0 10px; background: #1c0d16; color: var(--ink); border: 1px solid var(--line); border-radius: 10px; font-size: .95rem; }
  .coinrow { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; gap: 8px; }
  #coinPreview { color: var(--accent2); font-size: .9rem; font-family: ui-monospace, monospace; }
  .linkbtn { background: none; border: none; color: var(--muted); font-size: .8rem; cursor: pointer; text-decoration: underline; padding: 0; }
  .linkbtn:hover { color: var(--accent); }
  .go {
    position: relative; width: 100%; margin-top: 22px; padding: 14px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #3a0a22; font-size: 1.05rem; font-weight: 800; cursor: pointer;
    box-shadow: 0 8px 20px rgba(255,95,162,.35); transition: transform .1s, box-shadow .2s;
  }
  .go:hover { transform: translateY(-2px); box-shadow: 0 12px 26px rgba(255,95,162,.5); }
  .go:hover .btn-pig { animation: hop .5s ease-in-out infinite; }
  .go:disabled { opacity: .5; cursor: default; }
  .btn-pig { display: inline-block; margin-left: 6px; }
  @keyframes hop { 0%,100% { transform: translateY(0) rotate(0); } 50% { transform: translateY(-5px) rotate(8deg); } }
  @keyframes wiggle { 0%,100% { transform: rotate(-9deg); } 50% { transform: rotate(9deg); } }

  .err { color: var(--err); font-size: .9rem; margin-top: 10px; min-height: 1.2em; }

  .pay { text-align: center; }
  .pay img { border-radius: 12px; background: white; padding: 6px; }
  .exact {
    font-family: ui-monospace, monospace; font-size: 1.15rem; margin: 14px 0 4px;
    color: var(--accent2); word-break: break-all;
  }
  .addr {
    font-family: ui-monospace, monospace; font-size: .78rem; color: var(--muted);
    word-break: break-all; margin: 6px 0 14px;
  }
  .hint { color: var(--muted); font-size: .85rem; margin: 10px 0; }
  .row { display: flex; gap: 10px; margin-top: 12px; }
  .row button {
    flex: 1; padding: 11px; border-radius: 10px; border: 1px solid var(--line);
    background: #1c0d16; color: var(--ink); cursor: pointer; font-size: .95rem; transition: .15s;
  }
  .row button:hover { border-color: var(--accent); }
  .paid { text-align: center; padding: 24px 0; }
  .paid .celebrate span { display: inline-block; font-size: 2.4rem; animation: hop .6s ease-in-out infinite; }
  .paid .celebrate span:nth-child(2) { animation-delay: .15s; }
  .paid .celebrate span:nth-child(3) { animation-delay: .3s; }
  .paid h2 { color: var(--ok); margin: 10px 0 6px; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="piggies" id="piggies" aria-hidden="true"></div>

<div class="card">
  <div id="step-form">
    <h1><span id="jarTitle">Tip Jar</span> <span class="title-pig" id="titlePig">🐷</span></h1>
    <p class="sub" id="jarSub">Drop a coin in the piggy bank — your name and message pop up live on stream. 💕</p>

    <label>Pay with</label>
    <div class="assets" id="assets"></div>

    <label>Amount</label>
    <div class="amtrow">
      <input id="fiat" inputmode="decimal" placeholder="10">
      <select id="currency" aria-label="Your currency"></select>
    </div>
    <div class="amounts" id="presets"></div>
    <div class="coinrow">
      <span id="coinPreview">≈ —</span>
      <button type="button" class="linkbtn" id="toggleExact">or enter exact <span id="symbol">ETH</span></button>
    </div>
    <div id="exactWrap" class="hidden" style="margin-top:8px">
      <input id="amount" inputmode="decimal" placeholder="0.01">
    </div>

    <label>Your name (shown on stream)</label>
    <input id="name" maxlength="40" placeholder="Anonymous">

    <label>Message (optional)</label>
    <textarea id="message" maxlength="200" placeholder="oink oink! 🐽"></textarea>

    <button class="go" id="go"><span id="btnText">Feed the piggy</span> <span class="btn-pig" id="btnPig">🐷</span></button>
    <div class="err" id="err"></div>
  </div>

  <div id="step-pay" class="pay hidden">
    <h1>Almost there! <span class="title-pig" id="payPig">🐖</span></h1>
    <p class="hint">Send <b>exactly</b> this amount — it's how we match the tip to your name:</p>
    <div class="exact" id="exact"></div>
    <img id="qr" alt="payment QR" width="260" height="260">
    <div class="addr" id="payaddr"></div>
    <div class="row">
      <button id="copy-amount">Copy amount</button>
      <button id="copy-addr">Copy address</button>
    </div>
    <div class="row hidden" id="mm-row">
      <button id="metamask">🦊 Pay with MetaMask</button>
    </div>
    <p class="hint" id="netnote" style="color:var(--ok)"></p>
    <p class="hint" id="expiry"></p>
    <p class="hint">Waiting for your coin… <span id="spin">◐</span></p>
    <div class="err" id="err2"></div>
  </div>

  <div id="step-paid" class="paid hidden">
    <div class="celebrate"><span id="celebPig1">🐷</span><span>🎉</span><span id="celebPig2">🐷</span></div>
    <h2>Coin received!</h2>
    <p class="hint">Your tip is popping up on stream right now. Thank you! 💕</p>
  </div>
</div>

<script>
(async () => {
  const $ = (id) => document.getElementById(id);

  // Robust copy with visible feedback (works on HTTPS; falls back otherwise).
  async function copyText(text, btn) {
    const label = btn.textContent;
    const flash = (ok) => { btn.textContent = ok ? '✓ Copied!' : 'Select & Ctrl+C'; setTimeout(() => { btn.textContent = label; }, 1300); };
    try {
      if (navigator.clipboard && window.isSecureContext) { await navigator.clipboard.writeText(text); return flash(true); }
      throw new Error('no clipboard');
    } catch {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-1000px';
      document.body.appendChild(ta); ta.focus(); ta.select();
      let ok = false; try { ok = document.execCommand('copy'); } catch {}
      document.body.removeChild(ta); flash(ok);
    }
  }

  // --- apply the configurable theme (title, pig, colors, animation) ---
  const theme = await fetch('/api/theme').then(r => r.json()).catch(() => ({}));
  const pig = theme.pig || '🐷';
  const speed = theme.speed || 1;
  if (theme.accent) document.documentElement.style.setProperty('--accent', theme.accent);
  if (theme.accent2) document.documentElement.style.setProperty('--accent2', theme.accent2);
  if (theme.title) { $('jarTitle').textContent = theme.title; document.title = theme.title; }
  if (theme.subtitle) $('jarSub').textContent = theme.subtitle;
  if (theme.buttonText) $('btnText').textContent = theme.buttonText;
  for (const id of ['titlePig', 'btnPig', 'payPig', 'celebPig1', 'celebPig2']) $(id).textContent = pig;

  // floating background piggies (count + speed from theme)
  (() => {
    const wrap = $('piggies');
    const count = Number.isFinite(theme.pigCount) ? theme.pigCount : 12;
    for (let i = 0; i < count; i++) {
      const s = document.createElement('span');
      s.textContent = pig;
      s.style.left = Math.random() * 100 + 'vw';
      s.style.fontSize = (1.3 + Math.random() * 1.8) + 'rem';
      s.style.animationDuration = ((11 + Math.random() * 12) / speed) + 's';
      s.style.animationDelay = (-Math.random() * 20) + 's';
      wrap.appendChild(s);
    }
  })();

  const cfg = await fetch('/api/config').then(r => r.json());
  const assetIds = Object.keys(cfg.assets);
  if (!assetIds.length) { $('err').textContent = 'No donation addresses configured yet.'; $('go').disabled = true; return; }
  const usdcContracts = cfg.usdcContracts || {};

  // Live prices per coin in several fiat currencies, so each tipper sees the
  // suggested amounts in a currency they understand.
  const prices = await fetch('/api/prices').then(r => r.json()).catch(() => ({}));
  const PRESETS = [10, 25, 50, 100];
  const CUR = { usd: '$', eur: '€', gbp: '£', cad: 'CA$', aud: 'A$' };

  function guessCurrency() {
    const l = (navigator.language || 'en').toLowerCase();
    const eu = ['de','fr','es','it','nl','pt','fi','el','ga','et','lv','lt','sk','sl','mt'];
    if (l.includes('gb')) return 'gbp';
    if (l.endsWith('-ca') || l.includes('ca')) return 'cad';
    if (l.endsWith('-au') || l.includes('au')) return 'aud';
    if (l.includes('-us')) return 'usd';
    if (eu.some(c => l === c || l.endsWith('-' + c) || l.startsWith(c + '-'))) return 'eur';
    return 'usd';
  }

  let currency = guessCurrency();
  // populate the picker
  for (const c of Object.keys(CUR)) {
    const o = document.createElement('option');
    o.value = c; o.textContent = `${CUR[c]} ${c.toUpperCase()}`;
    if (c === currency) o.selected = true;
    $('currency').appendChild(o);
  }

  let asset = assetIds[0];

  function fmtCoin(coin) {
    if (!isFinite(coin) || coin <= 0) return null;
    if (coin >= 1) return (Math.round(coin * 100) / 100).toString();
    return Number(coin.toPrecision(4)).toString();
  }
  function fiatToCoin(fiatAmt) {
    const price = prices[asset]?.[currency];
    if (!price || !(fiatAmt > 0)) return null;
    return fmtCoin(fiatAmt / price);
  }
  // Coin amount that will actually be sent: the exact field wins, else fiat→coin.
  function computeCoin() {
    if (!$('exactWrap').classList.contains('hidden') && $('amount').value.trim()) return $('amount').value.trim();
    return fiatToCoin(parseFloat($('fiat').value));
  }
  function updatePreview() {
    const coin = computeCoin();
    $('coinPreview').textContent = coin ? `≈ ${coin} ${cfg.assets[asset].symbol}` : '≈ —';
  }

  function render() {
    $('assets').innerHTML = '';
    for (const id of assetIds) {
      const a = cfg.assets[id];
      const b = document.createElement('button');
      b.className = 'asset' + (id === asset ? ' active' : '');
      b.textContent = a.label;
      b.onclick = () => { asset = id; render(); };
      $('assets').appendChild(b);
    }
    const a = cfg.assets[asset];
    $('symbol').textContent = a.symbol;
    $('presets').innerHTML = '';
    const price = prices[asset]?.[currency];
    for (const amt of PRESETS) {
      const btn = document.createElement('button');
      if (price) {
        btn.textContent = `${CUR[currency]}${amt}`;
        btn.onclick = () => { $('fiat').value = amt; $('amount').value = ''; updatePreview(); };
      } else {
        const fallback = (a.presets ?? [])[PRESETS.indexOf(amt)] ?? String(amt);
        btn.textContent = fallback;
        btn.onclick = () => { $('exactWrap').classList.remove('hidden'); $('amount').value = fallback; updatePreview(); };
      }
      $('presets').appendChild(btn);
    }
    updatePreview();
  }

  $('currency').onchange = () => { currency = $('currency').value; render(); };
  $('fiat').oninput = updatePreview;
  $('amount').oninput = updatePreview;
  $('toggleExact').onclick = () => { $('exactWrap').classList.toggle('hidden'); updatePreview(); };
  render();

  let poller, spinT;

  $('go').onclick = async () => {
    $('err').textContent = '';
    const amount = computeCoin();
    if (!amount) { $('err').textContent = 'Enter an amount.'; return; }
    const res = await fetch('/api/donate', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({
        asset,
        amount,
        name: $('name').value.trim(),
        message: $('message').value.trim(),
      }),
    });
    const data = await res.json();
    if (!res.ok) { $('err').textContent = data.error || 'Something went wrong'; return; }

    $('step-form').classList.add('hidden');
    $('step-pay').classList.remove('hidden');
    $('exact').textContent = `${data.amount} ${data.symbol}`;
    $('qr').src = data.qr;
    $('payaddr').textContent = data.recipient;
    $('expiry').textContent = `This request expires in ${data.expiresInMin} minutes.`;
    $('copy-amount').onclick = (e) => copyText(data.amount, e.currentTarget);
    $('copy-addr').onclick = (e) => copyText(data.recipient, e.currentTarget);

    // "Send on any network" reassurance for EVM assets
    const meta = cfg.assets[asset];
    if (meta.evm && meta.networks?.length) {
      $('netnote').textContent = `✅ Send on any of: ${meta.networks.join(', ')} — your tip is safe on any of them.`;
    } else {
      $('netnote').textContent = '';
    }

    // Browser-wallet one-click for EVM assets (native ETH on any network,
    // or USDC using whichever network the wallet is currently on)
    if (data.wallet && window.ethereum) {
      $('mm-row').classList.remove('hidden');
      $('metamask').onclick = async () => {
        $('err2').textContent = '';
        try {
          const [from] = await window.ethereum.request({ method: 'eth_requestAccounts' });
          let tx;
          if (data.wallet.kind === 'erc20') {
            const cid = parseInt(await window.ethereum.request({ method: 'eth_chainId' }), 16);
            const contract = usdcContracts[cid];
            if (!contract) {
              $('err2').textContent = `Switch your wallet to a supported network (${meta.networks.join(', ')}) to pay with USDC.`;
              return;
            }
            const calldata = '0xa9059cbb' +
              data.wallet.recipient.replace(/^0x/, '').toLowerCase().padStart(64, '0') +
              BigInt(data.wallet.amountBase).toString(16).padStart(64, '0');
            tx = { from, to: contract, data: calldata };
          } else {
            tx = { from, to: data.wallet.to, value: data.wallet.valueHex };
          }
          await window.ethereum.request({ method: 'eth_sendTransaction', params: [tx] });
        } catch (e) { $('err2').textContent = e?.message || 'Wallet error'; }
      };
    } else {
      $('mm-row').classList.add('hidden');
    }

    const frames = ['◐', '◓', '◑', '◒'];
    let f = 0;
    spinT = setInterval(() => { $('spin').textContent = frames[f++ % 4]; }, 250);
    poller = setInterval(async () => {
      const s = await fetch('/api/donate/' + data.id).then(r => r.json()).catch(() => null);
      if (s?.status === 'paid') {
        clearInterval(poller); clearInterval(spinT);
        $('step-pay').classList.add('hidden');
        $('step-paid').classList.remove('hidden');
      }
    }, 5000);
  };
})();
</script>
</body>
</html>
