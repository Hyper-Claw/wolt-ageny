<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Goal Widget</title>
<style>
  :root { --accent: #ff5fa2; --accent2: #ff9ad0; }
  body { margin: 0; background: transparent; overflow: hidden;
         font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #fff; }
  .wrap {
    position: relative;
    width: 380px; padding: 16px 18px; border-radius: 16px;
    background: linear-gradient(135deg, rgba(58,15,40,.94), rgba(26,14,21,.94));
    border: 1px solid #4a2537; box-shadow: 0 8px 30px rgba(120,10,60,.4);
  }
  .title { font-weight: 800; font-size: 1.1rem; margin-bottom: 8px; }
  .bar { position: relative; height: 22px; background: #1c0d16; border-radius: 11px; overflow: visible; border: 1px solid #4a2537; }
  .barclip { position: absolute; inset: 0; border-radius: 11px; overflow: hidden; }
  .fill { height: 100%; width: 0; border-radius: 11px;
          background: linear-gradient(90deg, var(--accent), var(--accent2), #4be3a0);
          transition: width .8s cubic-bezier(.2,.8,.2,1); }
  /* piggy that rides along the end of the bar */
  .runner { position: absolute; top: 50%; transform: translate(-50%,-50%); font-size: 1.5rem;
            transition: left .8s cubic-bezier(.2,.8,.2,1); filter: drop-shadow(0 2px 4px rgba(0,0,0,.4)); }
  .nums { display: flex; justify-content: space-between; margin-top: 8px; font-size: .95rem; }
  .nums .raised { color: #4be3a0; font-weight: 700; }
  .nums .goal { color: #e0a8c6; }
  .top { margin-top: 14px; }
  .top h4 { margin: 0 0 6px; font-size: .8rem; color: #e0a8c6; text-transform: uppercase; letter-spacing: .05em; }
  .donor { display: flex; justify-content: space-between; font-size: .95rem; padding: 3px 0; }
  .donor .rank { color: var(--accent); margin-right: 6px; }
  .donor .amt { color: #4be3a0; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="title" id="title">🐷 Stream Goal</div>
  <div class="bar"><div class="barclip"><div class="fill" id="fill"></div></div><span class="runner" id="runner" style="left:0">🐷</span></div>
  <div class="nums"><span class="raised" id="raised">€0</span><span class="goal" id="goal"></span></div>
  <div class="top hidden" id="topwrap">
    <h4>Top Supporters</h4>
    <div id="donors"></div>
  </div>
</div>

<script>
(() => {
  const params = new URLSearchParams(location.search);
  const key = params.get('key') || '';
  const showTop = !params.has('nolist');
  const $ = (id) => document.getElementById(id);

  let pig = '🐷';
  (async () => {
    try {
      const t = await fetch('/api/theme').then(r => r.json());
      if (t && !t.error) {
        if (t.pig) { pig = t.pig; $('runner').textContent = pig; }
        if (t.accent) document.documentElement.style.setProperty('--accent', t.accent);
        if (t.accent2) document.documentElement.style.setProperty('--accent2', t.accent2);
      }
    } catch {}
  })();

  async function refresh() {
    let s;
    try { s = await fetch(`/api/stats?key=${encodeURIComponent(key)}`).then(r => r.json()); } catch { return; }
    if (!s || s.error) return;

    $('title').textContent = `${pig} ${s.goalTitle || 'Stream Goal'}`;
    $('raised').textContent = `€${s.totalEur.toLocaleString()}`;
    let pct;
    if (s.goalEur > 0) {
      $('goal').textContent = `/ €${s.goalEur.toLocaleString()}`;
      pct = Math.min(100, (s.totalEur / s.goalEur) * 100);
    } else {
      $('goal').textContent = `${s.count} tip${s.count === 1 ? '' : 's'}`;
      pct = s.totalEur > 0 ? 100 : 0;
    }
    $('fill').style.width = pct + '%';
    $('runner').style.left = pct + '%';   // piggy rides the end of the bar

    if (showTop && s.top?.length) {
      $('topwrap').classList.remove('hidden');
      $('donors').innerHTML = '';
      s.top.forEach((d, i) => {
        const row = document.createElement('div');
        row.className = 'donor';
        const left = document.createElement('span');
        const rank = document.createElement('span');
        rank.className = 'rank'; rank.textContent = `#${i + 1}`;
        left.appendChild(rank);
        left.appendChild(document.createTextNode(d.name)); // textContent-safe
        const amt = document.createElement('span');
        amt.className = 'amt'; amt.textContent = `€${Math.round(d.eur)}`;
        row.appendChild(left); row.appendChild(amt);
        $('donors').appendChild(row);
      });
    }
  }

  refresh();
  setInterval(refresh, 15_000);

  // Bump instantly when a donation lands.
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws?key=${encodeURIComponent(key)}`);
    ws.onmessage = () => refresh();
    ws.onclose = () => setTimeout(connect, 3000);
  }
  connect();
})();
</script>
</body>
</html>
