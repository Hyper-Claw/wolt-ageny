name: Deploy to VPS

# Runs on every push to main, and can also be triggered by hand from the
# GitHub "Actions" tab (the "Run workflow" button) — handy for a non-technical
# owner who just wants to click a button.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never let two deploys run at once.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$HOST" ] || [ -z "$USER" ]; then
            echo "::error::Missing secrets. Set DEPLOY_HOST, DEPLOY_USER, and DEPLOY_SSH_KEY (see DEPLOY.md)."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new "$USER@$HOST" '
            set -e
            cd ~/wolt-ageny
            git pull --ff-only
            docker compose up -d --build
            docker image prune -f
            echo "Deploy complete."
          '
